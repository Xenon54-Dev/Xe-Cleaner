name: Build iOS IPA (unsigned)

# Builds an UNSIGNED .ipa on a free macOS runner. AltStore / Sideloadly adds
# the signature with your free Apple ID when you install it on your iPhone.
# Trigger automatically on push, or manually from the Actions tab.

on:
  workflow_dispatch:
  push:
    branches: [master, main]

jobs:
  build-ipa:
    runs-on: macos-15
    timeout-minutes: 60
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select latest Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install JS dependencies
        run: npm ci || npm install

      - name: Generate native iOS project (expo prebuild)
        run: npx expo prebuild --platform ios --clean --no-install
        env:
          CI: '1'
          EXPO_NO_TELEMETRY: '1'

      - name: Install CocoaPods
        run: |
          cd ios
          pod install

      - name: Build unsigned app
        run: |
          cd ios
          WORKSPACE=$(ls -d *.xcworkspace | head -n1)
          SCHEME=$(xcodebuild -list -workspace "$WORKSPACE" -json | node -e "let d='';process.stdin.on('data',c=>d+=c);process.stdin.on('end',()=>console.log(JSON.parse(d).workspace.schemes[0]))")
          echo "Workspace: $WORKSPACE  |  Scheme: $SCHEME"
          xcodebuild \
            -workspace "$WORKSPACE" \
            -scheme "$SCHEME" \
            -configuration Release \
            -sdk iphoneos \
            -derivedDataPath build \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            PROVISIONING_PROFILE_SPECIFIER="" \
            clean build

      - name: Package into unsigned .ipa
        run: |
          cd ios/build/Build/Products/Release-iphoneos
          APP=$(ls -d *.app | head -n1)
          echo "Packaging: $APP"
          mkdir -p Payload
          cp -R "$APP" Payload/
          zip -qr "$GITHUB_WORKSPACE/XeCleaner-unsigned.ipa" Payload

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: XeCleaner-ipa
          path: XeCleaner-unsigned.ipa
          if-no-files-found: error
