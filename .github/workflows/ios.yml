name: Build iOS IPA (unsigned)

# Builds an UNSIGNED .ipa on a free macOS runner. AltStore / Sideloadly adds
# the signature with your free Apple ID when you install it on your iPhone.
# Trigger automatically on push, or manually from the Actions tab.

on:
  workflow_dispatch:
  push:
    branches: [master, main]

jobs:
  build-ipa:
    runs-on: macos-15
    timeout-minutes: 60
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select latest Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install JS dependencies
        run: npm ci || npm install

      - name: Generate native iOS project (expo prebuild)
        run: npx expo prebuild --platform ios --clean --no-install
        env:
          CI: '1'
          EXPO_NO_TELEMETRY: '1'

      - name: Install CocoaPods
        run: |
          cd ios
          pod install

      - name: Build unsigned app
        run: |
          cd ios
          WORKSPACE=$(ls -d *.xcworkspace | head -n1)
          APP_XCODEPROJ=$(ls -d *.xcodeproj 2>/dev/null | grep -v Pods | head -n1)
          if [ -z "$APP_XCODEPROJ" ]; then
            echo "ERROR: No app .xcodeproj found in ios/"
            ls -la
            exit 1
          fi
          SCHEME=$(basename "$APP_XCODEPROJ" .xcodeproj)
          echo "Workspace: $WORKSPACE  |  App project: $APP_XCODEPROJ  |  Scheme: $SCHEME"
          xcodebuild \
            -workspace "$WORKSPACE" \
            -scheme "$SCHEME" \
            -configuration Release \
            -sdk iphoneos \
            -destination 'generic/platform=iOS' \
            -derivedDataPath build \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            PROVISIONING_PROFILE_SPECIFIER="" \
            ONLY_ACTIVE_ARCH=NO \
            clean build
          echo "--- .app outputs ---"
          find build -maxdepth 8 -name "*.app" -type d -print

      - name: Package into unsigned .ipa
        run: |
          APP_PATH=$(find ios/build -name "*.app" -type d -path "*Release-iphoneos*" | head -n1)
          if [ -z "$APP_PATH" ]; then APP_PATH=$(find ios/build -name "*.app" -type d | head -n1); fi
          if [ -z "$APP_PATH" ]; then
            echo "ERROR: No .app produced. ios/build tree:"
            find ios/build -maxdepth 6 -type d | head -50
            exit 1
          fi
          echo "Packaging: $APP_PATH"
          WORK=$(mktemp -d)
          mkdir -p "$WORK/Payload"
          cp -R "$APP_PATH" "$WORK/Payload/"
          (cd "$WORK" && zip -qr "$GITHUB_WORKSPACE/XeCleaner-unsigned.ipa" Payload)
          ls -lh "$GITHUB_WORKSPACE/XeCleaner-unsigned.ipa"

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: XeCleaner-ipa
          path: XeCleaner-unsigned.ipa
          if-no-files-found: error
